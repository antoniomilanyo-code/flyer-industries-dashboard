<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaxMate - Flyer Industries</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #12141c;
      --surface: #1a1d27;
      --surface-2: #222636;
      --border: rgba(255,255,255,.08);
      --text: #e8eaf0;
      --text-muted: #8b90a0;
      --text-faint: #5a5f72;
      --primary: #5ba0d9;
      --primary-dim: rgba(91,160,217,.15);
      --green: #5B8A5E;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .app { display: flex; min-height: 100vh; }
    .sidebar {
      width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      position: fixed;
      height: 100vh;
      display: flex;
      flex-direction: column;
      z-index: 100;
    }
    .sidebar-header {
      padding: 20px 16px;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-family: 'Inter', sans-serif;
      font-size: 20px;
      font-weight: 800;
      font-style: italic;
      letter-spacing: 1px;
      text-transform: uppercase;
      background: linear-gradient(180deg, #fff 0%, #c0c0c0 50%, #808080 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .nav-section {
      padding: 20px 12px;
      flex: 1;
      overflow-y: auto;
    }
    .nav-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-faint);
      padding: 0 8px 8px;
    }
    .nav-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 13px;
      color: var(--text-muted);
      background: none;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 2px;
      text-decoration: none;
    }
    .nav-btn:hover {
      background: var(--surface-2);
      color: var(--text);
    }
    .nav-btn.active {
      background: var(--primary-dim);
      color: var(--primary);
    }
    .main {
      flex: 1;
      margin-left: 260px;
      padding: 32px;
      min-height: 100vh;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      padding: 4px 0;
      margin-bottom: 16px;
      font-family: inherit;
      text-decoration: none;
    }
    .back-btn:hover { color: var(--primary); }
    .page-title { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
    .page-sub { color: var(--text-muted); font-size: 14px; margin-bottom: 20px; }
    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .section h2 { font-size: 15px; font-weight: 600; margin-bottom: 16px; }
    @media (max-width: 900px) {
      .sidebar { transform: translateX(-100%); }
      .main { margin-left: 0; padding: 20px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">FLYER INDUSTRIES</div>
      </div>
      <nav class="nav-section">
        <div class="nav-label">Businesses</div>
        <a href="index.html" class="nav-btn">
          <i class="fas fa-home"></i> Dashboard
        </a>
        <a href="crafted.html" class="nav-btn">
          <i class="fas fa-coffee"></i> Crafted
        </a>
        <a href="ascend.html" class="nav-btn">
          <i class="fas fa-building"></i> Ascend Estate
        </a>
        <div class="nav-label" style="margin-top: 20px;">Documents</div>
        <a href="pdfs.html" class="nav-btn">
          <i class="fas fa-file-pdf"></i> PDF Reports
        </a>
      </nav>
    </aside>

    <main class="main">
      <a href="index.html" class="back-btn">← Back</a>
      <h1 class="page-title">TaxMate</h1>
      <p class="page-sub">Tax Services for Australian Clients</p>
      
      <div class="section">
        <h2>Setup Required</h2>
        <div style="padding: 40px; text-align: center; color: var(--text-muted);">
          <div style="font-size: 48px; margin-bottom: 16px;">📋</div>
          <p>TaxMate configuration is pending.</p>
          <p style="font-size: 13px; margin-top: 8px;">Contact your administrator to complete setup.</p>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    console.log('TaxMate page connected to Supabase');
  </script>
</body>
</html>
